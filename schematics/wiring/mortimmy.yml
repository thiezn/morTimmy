options:
  mini_bom_mode: false

connectors:
  BAT1:
    pinlabels: [ "B+", "B-" ]
    type: Battery holder
    subtype: 2x18650, 2S 7.4 V

  REG1:
    pinlabels: [ "VIN+", "VIN-", "VOUT+", "VOUT-" ]
    type: UBEC / buck
    subtype: 3A-6S in, 5 V 3 A out

  RPI_PWR:
    pinlabels: [ "5V_IN", "GND" ]
    type: Raspberry Pi 3B V1.2
    subtype: 5 V input

  RPI_USB_AUDIO:
    pinlabels: [ "VBUS", "D-", "D+", "GND", "SHELL" ]
    type: Raspberry Pi 3B V1.2
    subtype: USB host to audio

  RPI_USB_CTRL:
    pinlabels: [ "VBUS", "D-", "D+", "GND", "SHELL" ]
    type: Raspberry Pi 3B V1.2
    subtype: USB host to control

  PICO_AUDIO_USB:
    pinlabels: [ "VBUS", "D-", "D+", "GND", "SHELL" ]
    type: Pico 2 W + Audio Pack
    subtype: USB device

  PICO_AUDIO_LCD:
    pinlabels:
      [
        "P40 5V",
        "GP2 RS",
        "GP3 E",
        "GP4 D4",
        "GP5 D5",
        "GP6 D6",
        "GP7 D7",
        "P8 GND",
      ]
    type: Pico 2 W + Audio Pack
    subtype: LCD GPIO
    notes: GP9-GP11 stay reserved for I2S audio.

  PICO_CTRL_USB:
    pinlabels: [ "VBUS", "D-", "D+", "GND", "SHELL" ]
    type: Pico LiPo 2
    subtype: USB device

  PICO_CTRL_LEFT:
    pinlabels:
      [
        "GP2 P4 ENA",
        "GP3 P5 IN1",
        "GP4 P7 IN2",
        "GP5 P8 IN3",
        "GP6 P10 IN4",
        "GP7 P11 ENB",
        "GND P9",
      ]
    type: Pico LiPo 2
    subtype: left GPIO

  PICO_CTRL_RIGHT:
    pinlabels:
      [
        "GP8 P12 ENA",
        "GP9 P13 IN1",
        "GP10 P14 IN2",
        "GP11 P15 IN3",
        "GP12 P16 IN4",
        "GP13 P17 ENB",
        "GND P18",
      ]
    type: Pico LiPo 2
    subtype: right GPIO

  PICO_CTRL_SENSOR:
    pinlabels:
      [
        "3V3 OUT",
        "VBUS P40 5V",
        "GP14 P19 TRIG_LEFT",
        "GP15 P20 ECHO_LEFT",
        "GP16 P21 TRIG_RIGHT",
        "GP17 P22 ECHO_RIGHT",
        "GND P23",
      ]
    type: Pico LiPo 2
    subtype: ultrasonic GPIO
    notes: Two HC-SR04 modules share one 4-channel BSS138 level shifter.

  DRV_LEFT_CTRL:
    pinlabels: [ "ENA", "IN1", "IN2", "IN3", "IN4", "ENB", "GND" ]
    type: L298N dual H-bridge
    subtype: left control
    notes: Check 3.3 V GPIO compatibility.

  DRV_LEFT_PWR:
    pinlabels: [ "VMS", "GND", "5V" ]
    type: L298N dual H-bridge
    subtype: left power

  DRV_LEFT_OUT:
    pinlabels: [ "MOTORA+", "MOTORA-", "MOTORB+", "MOTORB-" ]
    type: L298N dual H-bridge
    subtype: left outputs

  DRV_RIGHT_CTRL:
    pinlabels: [ "ENA", "IN1", "IN2", "IN3", "IN4", "ENB", "GND" ]
    type: L298N dual H-bridge
    subtype: right control

  DRV_RIGHT_PWR:
    pinlabels: [ "VMS", "GND", "5V" ]
    type: L298N dual H-bridge
    subtype: right power

  DRV_RIGHT_OUT:
    pinlabels: [ "MOTORA+", "MOTORA-", "MOTORB+", "MOTORB-" ]
    type: L298N dual H-bridge
    subtype: right outputs

  MOTOR_FL:
    pinlabels: [ "+", "-" ]
    type: DC gear motor
    subtype: front-left

  MOTOR_RL:
    pinlabels: [ "+", "-" ]
    type: DC gear motor
    subtype: rear-left

  MOTOR_FR:
    pinlabels: [ "+", "-" ]
    type: DC gear motor
    subtype: front-right

  MOTOR_RR:
    pinlabels: [ "+", "-" ]
    type: DC gear motor
    subtype: rear-right

  US1:
    pinlabels: [ "VCC", "TRIG", "ECHO", "GND" ]
    type: HC-SR04
    subtype: 5 V ultrasonic, forward-left about 45 degrees
    notes: 2 cm to 4 m, about 15 mA, 10 us trigger pulse. Forward-left obstacle
      sensor.

  US2:
    pinlabels: [ "VCC", "TRIG", "ECHO", "GND" ]
    type: HC-SR04
    subtype: 5 V ultrasonic, forward-right about 45 degrees
    notes: 2 cm to 4 m, about 15 mA, 10 us trigger pulse. Forward-right obstacle
      sensor.

  LEVEL_SHIFT1:
    pinlabels:
      [
        "LV 3V3",
        "HV 5V",
        "GND",
        "LV1 LEFT_TRIG_LO",
        "HV1 LEFT_TRIG_HI",
        "LV2 LEFT_ECHO_LO",
        "HV2 LEFT_ECHO_HI",
        "LV3 RIGHT_TRIG_LO",
        "HV3 RIGHT_TRIG_HI",
        "LV4 RIGHT_ECHO_LO",
        "HV4 RIGHT_ECHO_HI",
      ]
    type: Adafruit level converter
    subtype: 4-channel BSS138
    notes: Four independent BSS138 channels with 10 kOhm pullups. All four channels
      are used by the left and right HC-SR04 TRIG/ECHO pairs.

  LCD1:
    pinlabels:
      [
        "VSS",
        "VDD",
        "VO",
        "RS",
        "RW",
        "E",
        "D0 NC",
        "D1 NC",
        "D2 NC",
        "D3 NC",
        "D4",
        "D5",
        "D6",
        "D7",
        "LEDA",
        "LEDK",
      ]
    type: Liquid Crystal Display
    subtype: LCM1602C V2.1, 16x2
    notes: 4-bit write-only mode; RW tied low.

  LCD_CONTRAST:
    pinlabels: [ "5V", "VO", "GND" ]
    type: Potentiometer
    subtype: 10 kOhm contrast trim

cables:
  BAT_TO_REG:
    category: bundle
    length: 0.18
    gauge: 18 AWG
    colors: [ RD, BK ]

  BAT_TO_DRV_LEFT:
    category: bundle
    length: 0.22
    gauge: 18 AWG
    colors: [ RD, BK ]

  BAT_TO_DRV_RIGHT:
    category: bundle
    length: 0.22
    gauge: 18 AWG
    colors: [ RD, BK ]

  REG_TO_PI:
    category: bundle
    length: 0.20
    gauge: 20 AWG
    colors: [ RD, BK ]

  USB_AUDIO:
    wirecount: 4
    length: 0.25
    gauge: 28 AWG
    colors: [ RD, WH, GN, BK ]
    shield: true

  USB_CTRL:
    wirecount: 4
    length: 0.25
    gauge: 28 AWG
    colors: [ RD, WH, GN, BK ]
    shield: true

  AUDIO_LCD_MAIN:
    category: bundle
    length: 0.18
    gauge: 26 AWG
    colors: [ RD, VT, BU, GY, OG, BN, PK, BK ]

  LCD_CONTRAST_POT:
    category: bundle
    length: 0.10
    gauge: 26 AWG
    colors: [ RD, WH, BK ]

  LCD_CONTRAST_WIPER:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ WH ]

  LCD_RW_GND:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ BK ]

  LCD_BACKLIGHT:
    category: bundle
    length: 0.10
    gauge: 26 AWG
    colors: [ YE, BK ]
    notes: LEDA should include an inline ~220 Ohm series resistor if the module does
      not already provide one.

  CTRL_LEFT:
    category: bundle
    length: 0.24
    gauge: 26 AWG
    colors: [ VT, BU, GY, OG, BN, PK, BK ]

  CTRL_RIGHT:
    category: bundle
    length: 0.24
    gauge: 26 AWG
    colors: [ VT, BU, GY, OG, BN, PK, BK ]

  US_LEFT_POWER:
    category: bundle
    length: 0.18
    gauge: 26 AWG
    colors: [ RD, BK ]

  US_RIGHT_POWER:
    category: bundle
    length: 0.18
    gauge: 26 AWG
    colors: [ RD, BK ]

  US_LEVEL_POWER:
    category: bundle
    length: 0.10
    gauge: 26 AWG
    colors: [ WH, RD, BK ]

  US_LEFT_TRIG_LOW:
    wirecount: 1
    length: 0.06
    gauge: 26 AWG
    colors: [ YE ]

  US_LEFT_TRIG_HIGH:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ OG ]

  US_LEFT_ECHO_HIGH:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ GN ]

  US_LEFT_ECHO_LOW:
    wirecount: 1
    length: 0.10
    gauge: 26 AWG
    colors: [ BU ]

  US_RIGHT_TRIG_LOW:
    wirecount: 1
    length: 0.06
    gauge: 26 AWG
    colors: [ VT ]

  US_RIGHT_TRIG_HIGH:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ PK ]

  US_RIGHT_ECHO_HIGH:
    wirecount: 1
    length: 0.08
    gauge: 26 AWG
    colors: [ GY ]

  US_RIGHT_ECHO_LOW:
    wirecount: 1
    length: 0.10
    gauge: 26 AWG
    colors: [ BN ]

  LEFT_FRONT_MOTOR:
    category: bundle
    length: 0.25
    gauge: 20 AWG
    colors: [ RD, BK ]

  LEFT_REAR_MOTOR:
    category: bundle
    length: 0.25
    gauge: 20 AWG
    colors: [ BU, BK ]

  RIGHT_FRONT_MOTOR:
    category: bundle
    length: 0.25
    gauge: 20 AWG
    colors: [ OG, BK ]

  RIGHT_REAR_MOTOR:
    category: bundle
    length: 0.25
    gauge: 20 AWG
    colors: [ GN, BK ]

connections:
  - - BAT1: [ 1-2 ]
    - BAT_TO_REG: [ 1-2 ]
    - REG1: [ 1-2 ]

  - - BAT1: [ 1-2 ]
    - BAT_TO_DRV_LEFT: [ 1-2 ]
    - DRV_LEFT_PWR: [ 1-2 ]

  - - BAT1: [ 1-2 ]
    - BAT_TO_DRV_RIGHT: [ 1-2 ]
    - DRV_RIGHT_PWR: [ 1-2 ]

  - - REG1: [ 3-4 ]
    - REG_TO_PI: [ 1-2 ]
    - RPI_PWR: [ 1-2 ]

  - - RPI_USB_AUDIO: [ 1-4 ]
    - USB_AUDIO: [ 1-4 ]
    - PICO_AUDIO_USB: [ 1-4 ]

  - - RPI_USB_AUDIO: 5
    - USB_AUDIO: s
    - PICO_AUDIO_USB: 5

  - - PICO_AUDIO_LCD: [ 1-8 ]
    - AUDIO_LCD_MAIN: [ 1-8 ]
    - LCD1: [ 2, 4, 6, 11, 12, 13, 14, 1 ]

  - - PICO_AUDIO_LCD: [ 1, 8 ]
    - LCD_CONTRAST_POT: [ 1-2 ]
    - LCD_CONTRAST: [ 1, 3 ]

  - - LCD_CONTRAST: 2
    - LCD_CONTRAST_WIPER: 1
    - LCD1: 3

  - - PICO_AUDIO_LCD: 8
    - LCD_RW_GND: 1
    - LCD1: 5

  - - PICO_AUDIO_LCD: [ 1, 8 ]
    - LCD_BACKLIGHT: [ 1-2 ]
    - LCD1: [ 15-16 ]

  - - RPI_USB_CTRL: [ 1-4 ]
    - USB_CTRL: [ 1-4 ]
    - PICO_CTRL_USB: [ 1-4 ]

  - - RPI_USB_CTRL: 5
    - USB_CTRL: s
    - PICO_CTRL_USB: 5

  - - PICO_CTRL_LEFT: [ 1-7 ]
    - CTRL_LEFT: [ 1-7 ]
    - DRV_LEFT_CTRL: [ 1-7 ]

  - - PICO_CTRL_RIGHT: [ 1-7 ]
    - CTRL_RIGHT: [ 1-7 ]
    - DRV_RIGHT_CTRL: [ 1-7 ]

  - - PICO_CTRL_SENSOR: [ 1-2, 7 ]
    - US_LEVEL_POWER: [ 1-3 ]
    - LEVEL_SHIFT1: [ 1-3 ]

  - - LEVEL_SHIFT1: [ 2-3 ]
    - US_LEFT_POWER: [ 1-2 ]
    - US1: [ 1, 4 ]

  - - LEVEL_SHIFT1: [ 2-3 ]
    - US_RIGHT_POWER: [ 1-2 ]
    - US2: [ 1, 4 ]

  - - PICO_CTRL_SENSOR: 3
    - US_LEFT_TRIG_LOW: 1
    - LEVEL_SHIFT1: 4

  - - LEVEL_SHIFT1: 5
    - US_LEFT_TRIG_HIGH: 1
    - US1: 2

  - - US1: 3
    - US_LEFT_ECHO_HIGH: 1
    - LEVEL_SHIFT1: 7

  - - LEVEL_SHIFT1: 6
    - US_LEFT_ECHO_LOW: 1
    - PICO_CTRL_SENSOR: 4

  - - PICO_CTRL_SENSOR: 5
    - US_RIGHT_TRIG_LOW: 1
    - LEVEL_SHIFT1: 8

  - - LEVEL_SHIFT1: 9
    - US_RIGHT_TRIG_HIGH: 1
    - US2: 2

  - - US2: 3
    - US_RIGHT_ECHO_HIGH: 1
    - LEVEL_SHIFT1: 11

  - - LEVEL_SHIFT1: 10
    - US_RIGHT_ECHO_LOW: 1
    - PICO_CTRL_SENSOR: 6

  - - DRV_LEFT_OUT: [ 1-2 ]
    - LEFT_FRONT_MOTOR: [ 1-2 ]
    - MOTOR_FL: [ 1-2 ]

  - - DRV_LEFT_OUT: [ 3-4 ]
    - LEFT_REAR_MOTOR: [ 1-2 ]
    - MOTOR_RL: [ 1-2 ]

  - - DRV_RIGHT_OUT: [ 1-2 ]
    - RIGHT_FRONT_MOTOR: [ 1-2 ]
    - MOTOR_FR: [ 1-2 ]

  - - DRV_RIGHT_OUT: [ 3-4 ]
    - RIGHT_REAR_MOTOR: [ 1-2 ]
    - MOTOR_RR: [ 1-2 ]
